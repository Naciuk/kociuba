<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fake Obywatel v6</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0a0a0a, #1a0033);
            color: white;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        h1 { color: #00ffcc; margin: 10px; }
        .container { max-width: 420px; margin: 0 auto; }
        button {
            background: #00ffcc;
            color: black;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            margin: 12px;
            border-radius: 10px;
            cursor: pointer;
            width: 80%;
        }
        button:hover { background: #00ccaa; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🪪 FAKE OBYWATEL v6</h1>
        <p>Generator fałszywych dowodów</p>
        
        <button onclick="generateAndShow()">🔄 Wygeneruj Nowy Dowód</button>
        <button onclick="window.location.href='card.html'">📄 Otwórz Ostatni Dowód</button>
    </div>

    <script>
        let lastData = {};

        function randomPolishName() {
            const imiona = ["Jan", "Adam", "Piotr", "Kamil", "Marek", "Tomasz", "Michał", "Jakub", "Łukasz", "Dawid", "Mateusz"];
            const nazwiska = ["Kowalski", "Nowak", "Wiśniewski", "Wójcik", "Kamiński", "Lewandowski", "Zieliński", "Szymański", "Woźniak", "Kozłowski"];
            return {
                imie: imiona[Math.floor(Math.random() * imiona.length)],
                nazwisko: nazwiska[Math.floor(Math.random() * nazwiska.length)]
            };
        }

        function generatePESEL() {
            const rok = Math.floor(Math.random() * 40) + 1980;
            const miesiac = Math.floor(Math.random() * 12) + 1;
            const dzien = Math.floor(Math.random() * 28) + 1;
            
            let pesel = rok.toString().slice(-2) + 
                       miesiac.toString().padStart(2, '0') + 
                       dzien.toString().padStart(2, '0');
            
            for (let i = 0; i < 4; i++) pesel += Math.floor(Math.random() * 10);
            
            const weights = [1,3,7,9,1,3,7,9,1,3];
            let sum = 0;
            for (let i = 0; i < 10; i++) sum += parseInt(pesel[i]) * weights[i];
            const checksum = (10 - (sum % 10)) % 10;
            
            return pesel + checksum;
        }

        function generateAndShow() {
            const name = randomPolishName();
            const pesel = generatePESEL();
            const dataUrodzenia = pesel.substring(0,2) + "." + pesel.substring(2,4) + "." + (parseInt(pesel.substring(0,2)) < 30 ? "20" : "19") + pesel.substring(0,2);
            const nrDowodu = "ABC" + String(Math.floor(100000 + Math.random() * 900000));

            lastData = { imie: name.imie, nazwisko: name.nazwisko, dataUrodzenia, pesel, nrDowodu };
            localStorage.setItem('lastFakeID', JSON.stringify(lastData));
            
            alert(`✅ Wygenerowano!\n\n${name.imie} ${name.nazwisko}\nPESEL: ${pesel}\nData ur.: ${dataUrodzenia}\nNr dowodu: ${nrDowodu}`);
            window.location.href = "card.html";
        }
    </script>
</body>
</html>
