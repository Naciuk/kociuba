<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mDowód</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f0f0f0;
            margin: 0;
            padding: 10px;
        }
        .card {
            max-width: 420px;
            margin: 20px auto;
            background: linear-gradient(135deg, #e0f0ff, #c0e0ff);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            border: 1px solid #aaa;
        }
        .top-bar {
            background: #003399;
            color: white;
            padding: 8px;
            font-size: 15px;
            text-align: center;
        }
        .content {
            padding: 20px;
            position: relative;
        }
        .photo {
            width: 110px;
            height: 140px;
            background: #ddd;
            float: right;
            border: 2px solid #003399;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            margin-left: 15px;
        }
        h2 { margin: 5px 0; font-size: 22px; }
        p { margin: 8px 0; font-size: 16px; }
        .label { font-size: 13px; color: #555; }
        .flag { font-size: 30px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="top-bar">mDowód • Rzeczpospolita Polska</div>
        <div class="content">
            <div class="photo">🪪</div>
            
            <h2 id="imie">Jan Kowalski</h2>
            <p><span class="label">Imię (imiona)</span></p>
            
            <p><strong id="nazwisko">KOWALSKI</strong></p>
            <p><span class="label">Nazwisko</span></p>
            
            <p><strong>POLSKIE</strong></p>
            <p><span class="label">Obywatelstwo</span></p>
            
            <p id="dataUrodzenia">01.01.1990</p>
            <p><span class="label">Data urodzenia</span></p>
            
            <p id="pesel">90010112345</p>
            <p><span class="label">Numer PESEL</span></p>
            
            <div style="margin-top:20px;">
                <span class="flag">🇵🇱</span>
            </div>
        </div>
    </div>

    <p style="font-size:11px; color:#666; text-align:center; margin-top:30px;">
        Aplikacja do celów edukacyjnych i demonstracyjnych.<br>
        Dane fikcyjne • Tylko do żartu / testów
    </p>

    <button onclick="history.back()" style="background:#0066cc; color:white; border:none; padding:12px 30px; border-radius:8px; font-size:16px;">← Wróć do generatora</button>

    <script>
        const data = JSON.parse(localStorage.getItem('lastFakeMDowod') || '{}');
        if (data.imie) {
            document.getElementById('imie').textContent = data.imie + " " + data.nazwisko;
            document.getElementById('nazwisko').textContent = data.nazwisko.toUpperCase();
            document.getElementById('dataUrodzenia').textContent = data.dataUrodzenia;
            document.getElementById('pesel').textContent = data.pesel;
        }
    </script>
</body>
</html>
